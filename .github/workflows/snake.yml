name: Generate Snake

on:
  schedule:
    - cron: "*/30 * * * *" # roda a cada 30 minutos
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: alexsami-lopes
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#f56607&color_dots=#f0f8ff,#a6d9ff,#4db8ff,#0099e6,#005c8a
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
